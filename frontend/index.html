<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AI-powered answer script evaluation system with OCR and NLP">
    <title>AI Answer Evaluator — Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Theme Toggle -->
    <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle dark mode">
        <span class="icon moon-icon">🌙</span>
        <span class="icon sun-icon">☀️</span>
    </button>

    <div class="auth-container">
        <div class="auth-card">
            <div class="logo">📝</div>
            <h2>AI Answer Evaluator</h2>
            <p class="subtitle">Automated Answer Script Evaluation System</p>

            <!-- Alert -->
            <div id="alert-box" class="alert d-none" role="alert"></div>

            <!-- Login Form -->
            <form id="login-form">
                <div class="mb-3">
                    <label for="login-email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="login-email" placeholder="Enter your email" required autocomplete="email">
                </div>
                <div class="mb-3">
                    <label for="login-password" class="form-label">Password</label>
                    <div class="password-wrapper">
                        <input type="password" class="form-control" id="login-password" placeholder="Enter your password" required autocomplete="current-password">
                        <button type="button" class="password-toggle" aria-label="Toggle password visibility">👁️‍🗨️</button>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2" id="login-btn">
                    <span class="btn-text">Login</span>
                </button>
                <p class="text-center mt-3 mb-0">
                    Don't have an account?
                    <a href="#" id="show-register" class="text-decoration-none">Register here</a>
                </p>
            </form>

            <!-- Register Form (hidden by default) -->
            <form id="register-form" class="d-none">
                <div class="mb-3">
                    <label for="reg-name" class="form-label">Full Name</label>
                    <input type="text" class="form-control" id="reg-name" placeholder="Enter your full name" required autocomplete="name">
                </div>
                <div class="mb-3">
                    <label for="reg-email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="reg-email" placeholder="Enter your email" required autocomplete="email">
                </div>
                <div class="mb-3">
                    <label for="reg-password" class="form-label">Password</label>
                    <div class="password-wrapper">
                        <input type="password" class="form-control" id="reg-password" placeholder="Min 6 characters" required minlength="6" autocomplete="new-password">
                        <button type="button" class="password-toggle" aria-label="Toggle password visibility">👁️‍🗨️</button>
                    </div>
                </div>
                <div class="mb-3">
                    <label for="reg-role" class="form-label">Register as</label>
                    <select class="form-select" id="reg-role">
                        <option value="student">Student</option>
                        <option value="teacher">Teacher</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2" id="register-btn">
                    <span class="btn-text">Create Account</span>
                </button>
                <p class="text-center mt-3 mb-0">
                    Already have an account?
                    <a href="#" id="show-login" class="text-decoration-none">Login here</a>
                </p>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
