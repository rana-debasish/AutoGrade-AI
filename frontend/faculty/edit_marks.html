<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Marks — AI Evaluator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <style>

.question-edit-card {
    border-left: 5px solid #4361ee;
    margin-bottom: 2rem;
    padding: 1.5rem;
    background: var(--card-bg);
    border-radius: 10px;
    box-shadow: var(--shadow-sm);
}

/* Answer boxes */

.answer-box {
    padding: 1rem;
    border-radius: 8px;
    margin-bottom: 1rem;
    max-height: 220px;
    overflow-y: auto;
    white-space: pre-wrap;
    line-height: 1.6;
    font-size: 0.95rem;
    color: var(--text-primary);
}

/* Student answer */

.student-answer {
    background: #fff8e6;
    border: 1px solid #ffc107;
    color: #333;
}

/* Model answer */

.model-answer {
    background: #e8f7ee;
    border: 1px solid #28a745;
    color: #1b4332;
}

/* Titles */

.answer-title {
    font-weight: 700;
    font-size: 0.85rem;
    margin-bottom: 6px;
}

/* AI similarity badge */

.ai-badge {
    background: #e7f1ff;
    color: #084298;
    padding: 4px 8px;
    border-radius: 6px;
    font-size: 0.8rem;
    font-weight: 600;
}

/* Fix dark mode text visibility */

[data-theme="dark"] .student-answer {
    background: rgba(255,193,7,0.15);
    color: #f1f5f9;
}

[data-theme="dark"] .model-answer {
    background: rgba(40,167,69,0.15);
    color: #f1f5f9;
}

</style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-custom">
        <div class="container-fluid">
            <a class="navbar-brand" href="/faculty/dashboard.html">&#x1F4DD; AI Evaluator</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="/faculty/dashboard.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="/faculty/reports.html">Reports</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="dashboard-container">
        <div class="page-header d-flex justify-content-between align-items-center">
            <div>
                <h1 id="page-title">Manual Mark Check</h1>
                <p id="student-info" class="text-muted">Loading submission details...</p>
            </div>
            <button class="btn btn-outline-secondary" onclick="history.back()">Back to Reports</button>
        </div>

        <div id="alert-box" class="alert d-none" role="alert"></div>

        <div class="row">
            <div class="col-lg-9">
                <form id="edit-marks-form">
                    <div id="questions-container">
                        <!-- Questions will be loaded here -->
                        <div class="text-center py-5">
                            <div class="spinner-border text-primary" role="status"></div>
                            <p class="mt-2 text-muted">Loading student submission...</p>
                        </div>
                    </div>

                    <div class="content-card mt-4">
                        <h5>faculty Comments</h5>
                        <textarea class="form-control" id="faculty-comments" rows="3" placeholder="Add feedback or reasons for mark adjustment..."></textarea>
                    </div>

                    <div class="d-flex justify-content-between align-items-center mt-4 mb-5">
                        <div class="h4 mb-0">
                            Total Marks: <span id="total-marks-display" class="text-primary">0</span>
                        </div>
                        <button type="submit" class="btn btn-primary btn-lg px-5" id="save-btn">Save Manual Evaluation</button>
                    </div>
                </form>
            </div>

            <div class="col-lg-3">
                <div class="content-card sticky-top" style="top: 20px;">
                    <h5>Submission Info</h5>
                    <div class="mb-3">
                        <label class="text-muted small d-block">Status</label>
                        <span id="sub-status" class="badge bg-secondary">-</span>
                    </div>
                    <div class="mb-3">
                        <label class="text-muted small d-block">AI Marks</label>
                        <div class="fw-bold h5" id="ai-marks-total">-</div>
                    </div>
                    <div class="mb-3">
                        <label class="text-muted small d-block">AI Similarity</label>
                        <div id="ai-sim-total">-</div>
                    </div>
                    <hr>
                    <div class="alert alert-info py-2 small">
                        Adjust marks as needed. The final score will be updated upon saving.
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/faculty.js"></script>
    <script>
        const user = requireAuth('faculty');
        if (user) {
            setupEditMarksPage();
        }
    </script>
</body>
</html>
